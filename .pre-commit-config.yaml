# yaml-language-server: $schema=https://json.schemastore.org/pre-commit-config.json
---
ci:
  autoupdate_schedule: quarterly
  skip: ["identity", "uv-lock"]

default_install_hook_types: ["pre-commit", "pre-push"]
default_stages: ["pre-commit"]

repos:
  - repo: meta
    hooks:
      - id: identity

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        args: ["--branch", "main"]
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-added-large-files
      - id: check-json
      - id: check-yaml
        exclude: ^src/(document_formats|yaml_parsing)/.*$
      - id: check-toml
      - id: check-ast
      - id: detect-private-key

  - repo: https://github.com/pre-commit-ci/pre-commit-ci-config
    rev: v1.6.1
    hooks:
      - id: check-pre-commit-ci-config

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.3
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/billwallis/bills-hooks
    rev: v0.0.13
    hooks:
      - id: banned-python-code
      - id: check-no-commit-comment
      - id: tidy-gitkeep

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-github-workflows
      - id: check-compose-spec

  - repo: local
    hooks:
      - id: check-pyproject-schema
        name: Validate pyproject.toml schema
        entry: check-jsonschema
        pass_filenames: true
        language: python
        additional_dependencies: ["check-jsonschema==0.37.0"]
        files: pyproject.toml
        args: ["--schemafile", "https://json.schemastore.org/pyproject.json"]
        # This calls a remote URL, so run on pre-push to avoid slowing down commits
        stages: ["pre-push"]
